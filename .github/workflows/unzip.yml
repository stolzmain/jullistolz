name: Распаковка архива в папку ux
on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. Очищаем корень от всего, кроме .git, .github, ux
      - name: Очистка корня (сохраняем .git, .github и ux)
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.github' ! -name 'ux' -exec rm -rf {} +

      # 2. Распаковываем архив во временную папку
      - name: Распаковка архива
        run: |
          mkdir -p ./temp_archive
          unzip -o jullistolz.ru.zip -d ./temp_archive

      # 3. Перемещаем содержимое jullistolz.ru/ux в папку ux (перезаписывая)
      - name: Перемещение файлов в ux
        run: |
          # Если папка ux уже существует, удаляем её содержимое (чтобы полностью заменить)
          rm -rf ./ux/* 2>/dev/null || true
          # Копируем всё из архива в ux
          cp -r ./temp_archive/jullistolz.ru/ux/* ./ux/
          # Удаляем временную папку
          rm -rf ./temp_archive

      # 4. Удаляем сам архив (чтобы не засорять)
      - name: Удаление архива
        run: rm -f jullistolz.ru.zip

      # 5. Сохраняем изменения в Git
      - name: Сохранение изменений
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Обновление сайта из архива (папка ux)"
