name: Распаковка архива
on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Удаление старой временной папки (если есть)
        run: rm -rf ./распакованный_сайт

      - name: Распаковка архива с принудительной перезаписью
        run: unzip -o jullistolz.ru.zip -d ./распакованный_сайт

      - name: Перенос файлов в корень и удаление временной папки
        run: |
          mv ./распакованный_сайт/jullistolz.ru/ux/* ./
          rm -rf ./распакованный_сайт

      - name: Сохранение изменений
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Распакован архив сайта"
