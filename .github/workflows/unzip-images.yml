name: Распаковать images.zip
on:
  workflow_dispatch:

jobs:
  unzip-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Найти и распаковать все images.zip
        run: |
          # Ищем все файлы images.zip в репозитории
          find . -name "images.zip" -type f | while read zipfile; do
            dir=$(dirname "$zipfile")
            echo "Найден архив: $zipfile"
            echo "Распаковываем в: $dir"
            cd "$dir"
            unzip -o images.zip
            rm -f images.zip   # удаляем архив после распаковки
            cd - >/dev/null
          done

      - name: Сохранить изменения
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Распакованы все images.zip"
