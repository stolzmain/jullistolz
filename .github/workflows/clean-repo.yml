name: Очистка репозитория (оставить только ux и .github/workflows)
on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Удалить всё, кроме ux, .github и .git
        run: |
          mkdir -p /tmp/keep
          mv ux /tmp/keep/ 2>/dev/null || true
          mv .github /tmp/keep/ 2>/dev/null || true
          # Удаляем всё остальное, но сохраняем .git
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' -exec rm -rf {} +
          mv /tmp/keep/* .
          rm -rf /tmp/keep

      - name: Сохранить изменения
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Очистка репозитория (оставлены только ux и .github/workflows)"
